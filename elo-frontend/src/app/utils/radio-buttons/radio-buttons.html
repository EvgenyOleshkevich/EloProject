<div class="radio-form__field">
    <label class="radio-form__label">{{title}}</label>

    <div class="radio-form__group">
    @for (option of options; track option.id) {
        <label class="radio-form__button">
            <input
            type="radio"
            [attr.name]="name"
            [checked]="isSelected(option)"
            (change)="onSelect(option)"
            />
            {{ option.title }}
        </label>
    }
    </div>

    @if (selectedValue == null) {
    <small class="radio-form__error">{{ title }} is required</small>
    }
</div>
